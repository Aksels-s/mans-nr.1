<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerija</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.3s;
        }
        body.dark .saturs { background: rgba(20,20,30,0.95); }
        body.dark h1 { color: #eee; }
        body.dark .nav { background: rgba(10,10,20,0.95); }
        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; z-index: 100;
        }
        .nav-logo { color: white; font-size: 20px; font-weight: bold; text-decoration: none; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-size: 15px; opacity: 0.85; }
        .nav-links a:hover { opacity: 1; }
        .saturs {
            background: rgba(255,255,255,0.92);
            max-width: 720px;
            margin: 100px auto 50px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        h1 { color: #222; font-size: 28px; text-align: center; margin-bottom: 24px; }
        .galerija { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .galerija img {
            width: 100%; height: 160px; object-fit: cover;
            border-radius: 12px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .galerija img:hover { transform: scale(1.04); box-shadow: 0 8px 25px rgba(0,0,0,0.25); }
        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 999; cursor: pointer;
        }
        .overlay.aktiva { display: flex; }
        .overlay img { max-width: 85%; max-height: 85%; border-radius: 12px; }
        .btn {
            display: block; width: 100%; padding: 12px;
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            margin-top: 20px; text-align: center; text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .btn-zila { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        #dark-toggle {
            position: fixed; top: 60px; right: 16px;
            background: rgba(255,255,255,0.15); color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-size: 14px; z-index: 200;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a class="nav-logo" href="index.html">🌿 Mana lapa</a>
        <div class="nav-links">
            <a href="index.html">Sākums</a>
            <a href="par-mani.html">Par mani</a>
            <a href="galerija.html">Galerija</a>
        </div>
    </nav>
    <button id="dark-toggle" onclick="toggleDark()">🌙</button>
    <div class="overlay" id="overlay" onclick="aizvert()">
        <img id="liela-bilde" src="" alt="Liela bilde">
    </div>
    <div class="saturs">
        <h1>🖼️ Mana galerija</h1>
        <div class="galerija">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=400" onclick="atvert(this.src)">
        </div>
        <a href="index.html" class="btn btn-zila">← Atpakaļ uz sākumu</a>
    </div>
    <script>
        function toggleDark() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️';
        }
        function atvert(src) {
            document.getElementById('liela-bilde').src = src;
            document.getElementById('overlay').classList.add('aktiva');
        }
        function aizvert() {
            document.getElementById('overlay').classList.remove('aktiva');
        }
    </script>
</body>
</html>
