<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerija</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.3s;
        }
        body.dark .saturs {
            background: rgba(30, 30, 30, 0.92);
            color: #eee;
        }
        body.dark h1 { color: #eee; }
        .saturs {
            background: rgba(255, 255, 255, 0.88);
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            transition: all 0.3s;
        }
        h1 { color: #333; text-align: center; }
        .galerija {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .galerija img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .galerija img:hover { transform: scale(1.05); }
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
        }
        .overlay.aktiva { display: flex; }
        .overlay img { max-width: 80%; max-height: 80%; border-radius: 10px; }
        button {
            background: #2196F3;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        button:hover { background: #1976D2; }
        #dark-toggle {
            position: fixed;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            width: auto;
        }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <button id="dark-toggle" onclick="toggleDark()">🌙 Tumšais</button>
    <div class="overlay" id="overlay" onclick="aizvert()">
        <img id="liela-bilde" src="" alt="Liela bilde">
    </div>
    <div class="saturs">
        <h1>🖼️ Mana galerija</h1>
        <div class="galerija">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=400" onclick="atvert(this.src)">
            <img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=400" onclick="atvert(this.src)">
        </div>
        <a href="index.html"><button>← Atpakaļ uz sākumu</button></a>
    </div>
    <script>
        function toggleDark() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️ Gaišais' : '🌙 Tumšais';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️ Gaišais';
        }
        function atvert(src) {
            document.getElementById('liela-bilde').src = src;
            document.getElementById('overlay').classList.add('aktiva');
        }
        function aizvert() {
            document.getElementById('overlay').classList.remove('aktiva');
        }
    </script>
</body>
</html>
