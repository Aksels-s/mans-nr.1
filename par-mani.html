<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Par mani</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.3s;
        }
        body.dark .saturs {
            background: rgba(30, 30, 30, 0.92);
            color: #eee;
        }
        body.dark h1, body.dark p { color: #eee; }
        .saturs {
            background: rgba(255, 255, 255, 0.88);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            transition: all 0.3s;
        }
        h1 { color: #333; }
        p { color: #555; line-height: 1.6; }
        button {
            background: #2196F3;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover { background: #1976D2; }
        #dark-toggle {
            position: fixed;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            width: auto;
        }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <button id="dark-toggle" onclick="toggleDark()">🌙 Tumšais</button>
    <div class="saturs">
        <h1>Par mani 👋</h1>
        <p>Sveiki! Es esmu praktikants kas mācās web izstrādi.</p>
        <p>Šobrīd mācos:</p>
        <p>💻 HTML — lapas struktūra</p>
        <p>🎨 CSS — dizains un izskats</p>
        <p>⚡ JavaScript — pogas un animācijas</p>
        <p>🔧 Git — koda saglabāšana</p>
        <br>
        <a href="index.html"><button>← Atpakaļ uz sākumu</button></a>
    </div>
    <script>
        function toggleDark() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️ Gaišais' : '🌙 Tumšais';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️ Gaišais';
        }
    </script>
</body>
</html>
