<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mana lapa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .saturs {
            background: rgba(255, 255, 255, 0.88);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
        }
        h1 { color: #333; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="saturs">
        <h1>Sveiki visiem!</h1>
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500" alt="Mana bilde" style="width:100%; border-radius:10px; margin:10px 0;">
        <h2>Raksti man!</h2>
        <input type="text" placeholder="Tavs vārds">
        <input type="email" placeholder="Tavs e-pasts">
        <textarea rows="4" placeholder="Tavs ziņojums..."></textarea>
        <button>Nosūtīt</button>
    </div>
</body>
</html>
