<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mana lapa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.3s;
        }
        body.dark .saturs { background: rgba(20,20,30,0.95); color: #eee; }
        body.dark input, body.dark textarea { background: #2a2a3a; color: #eee; border-color: #555; }
        body.dark h1, body.dark h2, body.dark #pulkstenis, body.dark p { color: #eee; }
        body.dark .nav { background: rgba(10,10,20,0.98); }

        @keyframes uzlido {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes ieplust {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }
        .nav { animation: uzlido 0.5s ease both; }
        .saturs { animation: ieplust 0.6s ease 0.2s both; }

        .nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 24px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-logo {
            color: white; font-size: 16px; font-weight: 700;
            text-decoration: none; letter-spacing: 0.5px;
        }
        .nav-links {
            display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
        }
        .nav-links a {
            color: white; text-decoration: none;
            font-size: 13px; opacity: 0.8;
            padding: 5px 10px; border-radius: 20px;
            transition: all 0.2s;
        }
        .nav-links a:hover { opacity: 1; background: rgba(255,255,255,0.15); }
        .nav-links a.spele {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 12px;
        }
        .nav-links a.spele:hover { background: rgba(255,255,255,0.25); }
        #dark-toggle {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 5px 12px;
            border-radius: 20px; cursor: pointer;
            font-size: 13px; margin-left: 6px;
            transition: all 0.2s;
        }
        #dark-toggle:hover { background: rgba(255,255,255,0.25); }

        .saturs {
            background: rgba(255,255,255,0.92);
            max-width: 520px;
            margin: 80px auto 50px;
            padding: 36px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: background 0.3s, color 0.3s;
        }
        h1 { color: #222; font-size: 26px; margin-bottom: 2px; }
        h2 { color: #333; font-size: 18px; margin: 18px 0 8px; }
        #pulkstenis { font-size: 13px; color: #888; margin-bottom: 14px; }

        #rakstas-teksts {
            font-size: 16px; font-weight: 600;
            color: #667eea; margin-bottom: 14px; min-height: 26px;
        }
        #kursors {
            display: inline-block; width: 2px; height: 18px;
            background: #667eea; margin-left: 2px;
            vertical-align: middle; animation: mirgo 0.7s infinite;
        }
        @keyframes mirgo {
            0%, 100% { opacity: 1; } 50% { opacity: 0; }
        }

        img.hero {
            width: 100%; border-radius: 12px;
            margin: 10px 0 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        input, textarea {
            width: 100%; padding: 11px 14px; margin: 5px 0;
            border: 1.5px solid #ddd; border-radius: 10px;
            font-size: 14px; transition: all 0.2s; background: #fafafa;
        }
        input:focus, textarea:focus {
            outline: none; border-color: #667eea;
            background: white; box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }
        .btn {
            display: block; width: 100%; padding: 11px;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            margin-top: 7px; text-align: center; text-decoration: none;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .btn-zala { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a1a; }
        .btn-zila { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-viola { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-sarkana { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; }
        .btn-dzeltena { background: linear-gradient(135deg, #ffd93d, #ff9a3c); color: #1a1a1a; }

        .spelu-rinda {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            margin-top: 7px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a class="nav-logo" href="index.html">🌿 Mana lapa</a>
        <div class="nav-links">
            <a href="index.html">Sākums</a>
            <a href="par-mani.html">Par mani</a>
            <a href="galerija.html">Galerija</a>
            <a href="tetris.html" class="spele">🧩 Tetris</a>
            <a href="pingpong.html" class="spele">🎾 Pong</a>
            <button id="dark-toggle" onclick="toggleDark()">🌙</button>
        </div>
    </nav>

    <div class="saturs">
        <h1>Sveiki visiem! 👋</h1>
        <p id="pulkstenis"></p>
        <p id="rakstas-teksts"><span id="teksts"></span><span id="kursors"></span></p>
        <img class="hero" src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500" alt="Ainava">
        <a href="par-mani.html" class="btn btn-zila">Par mani →</a>
        <a href="galerija.html" class="btn btn-viola">🖼️ Galerija →</a>
        <div class="spelu-rinda">
            <a href="tetris.html" class="btn btn-dzeltena">🧩 Tetris</a>
            <a href="pingpong.html" class="btn btn-sarkana">🎾 Ping Pong</a>
        </div>
        <h2>Raksti man!</h2>
        <input type="text" placeholder="Tavs vārds">
        <input type="email" placeholder="Tavs e-pasts">
        <textarea rows="4" placeholder="Tavs ziņojums..."></textarea>
        <button class="btn btn-zala" onclick="nosutit()">Nosūtīt ✉️</button>
        <p id="zinojums" style="text-align:center; margin-top:10px; color:green; font-weight:600; display:none;">✅ Ziņojums nosūtīts!</p>
    </div>

    <script>
        function toggleDark() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('dark-toggle').textContent = isDark ? '☀️' : '🌙';
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('dark-toggle').textContent = '☀️';
        }
        function atjaunotLaiku() {
            const t = new Date();
            const d = ['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'];
            document.getElementById('pulkstenis').textContent = d[t.getDay()] + ', ' + t.toLocaleDateString('lv-LV') + ' | ' + t.toLocaleTimeString('lv-LV');
        }
        atjaunotLaiku();
        setInterval(atjaunotLaiku, 1000);
        function nosutit() {
            const z = document.getElementById('zinojums');
            z.style.display = 'block';
            setTimeout(() => z.style.display = 'none', 3000);
        }
        const frāzes = [
            'Es mācos web izstrādi! 💻',
            'HTML, CSS, JavaScript... 🎨',
            'Git un GitHub! 🔧',
            'Veidoju savus pirmos projektus! 🚀',
            'Laipni lūgti manā lapā! 🌿'
        ];
        let frazeIndex = 0, burstuvIndex = 0, dzese = false;
        function rakstit() {
            const frase = frāzes[frazeIndex];
            const el = document.getElementById('teksts');
            if (!dzese) {
                el.textContent = frase.substring(0, burstuvIndex + 1);
                burstuvIndex++;
                if (burstuvIndex === frase.length) {
                    dzese = true;
                    setTimeout(rakstit, 1800);
                    return;
                }
                setTimeout(rakstit, 70);
            } else {
                el.textContent = frase.substring(0, burstuvIndex - 1);
                burstuvIndex--;
                if (burstuvIndex === 0) {
                    dzese = false;
                    frazeIndex = (frazeIndex + 1) % frāzes.length;
                }
                setTimeout(rakstit, 35);
            }
        }
        setTimeout(rakstit, 1000);
    </script>
</body>
</html>
