<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mana lapa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-image: url("https://images.unsplash.com/photo-1426604966848-d7adac402bff?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.3s;
        }
        body.dark .saturs {
            background: rgba(30, 30, 30, 0.92);
            color: #eee;
        }
        body.dark input,
        body.dark textarea {
            background: #444;
            color: #eee;
            border-color: #666;
        }
        body.dark h1,
        body.dark h2,
        body.dark #pulkstenis {
            color: #eee;
        }
        .saturs {
            background: rgba(255, 255, 255, 0.88);
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            transition: all 0.3s;
        }
        h1 { color: #333; }
        #pulkstenis {
            font-size: 18px;
            color: #666;
            margin: 0 0 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #45a049; }
        #dark-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            width: auto;
        }
        #dark-toggle:hover { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <button id="dark-toggle" onclick="toggleDark()">🌙 Tumšais</button>

    <div class="saturs">
        <h1>Sveiki visiem!</h1>
        <p id="pulkstenis"></p>
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=500" alt="Mana bilde" style="width:100%; border-radius:10px; margin:10px 0;">
        <h2>Raksti man!</h2>
        <input type="text" placeholder="Tavs vārds">
        <input type="email" placeholder="Tavs e-pasts">
        <textarea rows="4" placeholder="Tavs ziņojums..."></textarea>
        <button>Nosūtīt</button>
    </div>

    <script>
        function toggleDark() {
            document.body.classList.toggle('dark');
            const btn = document.getElementById('dark-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Gaišais';
            } else {
                btn.textContent = '🌙 Tumšais';
            }
        }

        function atjaunotLaiku() {
            const tagad = new Date();
            const dienas = ['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'];
            const diena = dienas[tagad.getDay()];
            const datums = tagad.toLocaleDateString('lv-LV');
            const laiks = tagad.toLocaleTimeString('lv-LV');
            document.getElementById('pulkstenis').textContent = diena + ', ' + datums + ' | ' + laiks;
        }

        atjaunotLaiku();
        setInterval(atjaunotLaiku, 1000);
    </script>
</body>
</html>
