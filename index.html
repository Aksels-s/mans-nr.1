</html><!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mana lapa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            background: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Sveiki visiem!</h1>
    <h2>Raksti man!</h2>

    <input type="text" placeholder="Tavs vārds">
    <input type="email" placeholder="Tavs e-pasts">
    <textarea rows="4" placeholder="Tavs ziņojums..."></textarea>
    <button>Nosūtīt</button>

</body>
</html>
